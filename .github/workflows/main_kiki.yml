# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - kiki

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      # 1. Build du frontend React
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build React app
        run: cd frontend && npm run build
        env:
          VITE_AZURE_CLIENT_ID: ${{ secrets.FRONT_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.TENANT_ID }}
          VITE_API_SCOPE: ${{ secrets.FRONT_API_SCOPE }}

      # 2. Configurer appsettings.json avec les secrets
      - name: Configure backend settings
        run: |
          sed -i 's/REPLACE_WITH_TENANT_ID/${{ secrets.TENANT_ID }}/g' backend/appsettings.json
          sed -i 's/REPLACE_WITH_CLIENT_ID/${{ secrets.BACK_CLIENT_ID }}/g' backend/appsettings.json

      # 3. Setup .NET
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # 4. Build du backend
      - name: Build with dotnet
        run: cd backend && dotnet build --configuration Release

      - name: dotnet publish
        run: cd backend && dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      # 5. Copier les fichiers React vers wwwroot du build publié
      - name: Copy React dist to published wwwroot
        run: |
          mkdir -p ${{env.DOTNET_ROOT}}/myapp/wwwroot
          cp -r frontend/dist/* ${{env.DOTNET_ROOT}}/myapp/wwwroot/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DC30B64081054F9C90AE67699CB5A31A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E12DFF41B495473FB84077C4D570867E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_173843A7EFD84274A60D6D05F536394F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kiki'
          slot-name: 'Production'
          package: .
